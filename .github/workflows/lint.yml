name: Lint Code

on:
  push:
    branches:
      - main  # Измените на вашу основную ветку
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install pylint  # Установите необходимые пакеты для Python

      - name: Install Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '23'

      - name: Install Node.js dependencies
        run: |
          cd node_site
          npm install  # Установите зависимости Node.js

      - name: Install HTMLHint
        run: npm install -g htmlhint eslint  # Установка HTMLHint и ESLint

      - name: Run linter
        run: |
          python3 linter.py  # Выполнение вашего скрипта линтинга
