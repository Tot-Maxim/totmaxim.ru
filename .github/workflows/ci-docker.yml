name: CI/CD Pipeline

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - prod

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      docker:
        image: docker:latest
        options: >-
          --privileged

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set version
        run: |
            echo "VERSION=1.2.3" >> $GITHUB_ENV

      - name: Set version
        run: |
            echo "VERSION=1.2.3" >> $GITHUB_ENV

      - name: Use version
        run: |
            echo "Current version is $VERSION"

      - name: Set up JDK
        uses: actions/setup-java@v2
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Build Node.js Docker image
        run: |
            cd node_site
            docker build . -t ${{ github.repository }}/node-app:latest

      - name: Build Java with Maven
        run: |
            cd api_spring/cow_and_bull
            mvn clean package

      - name: Run Java tests
        run: |
            cd api_spring/cow_and_bull
            mvn test

      - name: Build Java Docker image
        run: |
            cd api_spring/cow_and_bull
            docker build . -t ${{ github.repository }}/java-api:latest
